<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Decorative nodes (left cluster) -->
  <g opacity="0.6">
    <circle cx="120" cy="100" r="6" fill="#3b82f6"/>
    <circle cx="80" cy="160" r="5" fill="#8b5cf6"/>
    <circle cx="140" cy="200" r="4" fill="#ec4899"/>
    <line x1="120" y1="100" x2="80" y2="160" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="80" y1="160" x2="140" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="120" y1="100" x2="140" y2="200" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Decorative nodes (right cluster) -->
  <g opacity="0.6">
    <circle cx="780" cy="90" r="5" fill="#ec4899"/>
    <circle cx="820" cy="150" r="6" fill="#3b82f6"/>
    <circle cx="760" cy="210" r="4" fill="#8b5cf6"/>
    <line x1="780" y1="90" x2="820" y2="150" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
    <line x1="820" y1="150" x2="760" y2="210" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="780" y1="90" x2="760" y2="210" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Glow effect behind title -->
  <ellipse cx="450" cy="120" rx="200" ry="60" fill="url(#accent2)"/>

  <!-- Title -->
  <text x="450" y="125" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">
    One Agent SDK
  </text>

  <!-- Gradient underline -->
  <rect x="300" y="140" width="300" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="450" y="178" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8" letter-spacing="0.5">
    One SDK for every embedded agent. Build once, run anywhere.
  </text>

  <!-- Provider pills -->
  <g transform="translate(450, 220)">
    <!-- Claude -->
    <rect x="-185" y="-14" width="100" height="28" rx="14" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-135" y="5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#60a5fa">Claude</text>

    <!-- Codex -->
    <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#a78bfa">Codex</text>

    <!-- Kimi -->
    <rect x="85" y="-14" width="100" height="28" rx="14" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1" stroke-opacity="0.3"/>
    <text x="135" y="5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#f472b6">Kimi</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="296" width="900" height="4" rx="0" fill="url(#accent)"/>
</svg>
